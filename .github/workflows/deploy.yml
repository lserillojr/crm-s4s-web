# CI/CD → Hetzner (SSH + Swarm) — mesmo padrão de crm-s4s-ai / crm-s4s-painel.
# Push em main → build + push GHCR → docker service update via SSH no Swarm DEV.
#
# Secrets necessários (compartilhados com as outras APIs — mesmo host Swarm):
#  - SSH_HOST / SSH_USER / SSH_PRIVATE_KEY (deploy key hetzner_deploy)
#  - GITHUB_TOKEN (auto-disponível; scope write:packages incluso)
# Repository variables (não-secretas; inlinadas no build pelo Next):
#  - NEXT_PUBLIC_CHATWOOT_URL / NEXT_PUBLIC_ODOO_URL

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false # nao cancela deploy em andamento

env:
  IMAGE: ghcr.io/lserillojr/crm-s4s-web
  SERVICE: crm-s4s-web_crm-s4s-web

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # URLs públicas dos launchers SSO — Next inlineia no build (ver Dockerfile).
          # Valores em repository variables (não-secretos); HML/PROD podem sobrescrever via Environments.
          build-args: |
            NEXT_PUBLIC_CHATWOOT_URL=${{ vars.NEXT_PUBLIC_CHATWOOT_URL }}
            NEXT_PUBLIC_ODOO_URL=${{ vars.NEXT_PUBLIC_ODOO_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy → Swarm via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker service update \
              --image ${{ env.IMAGE }}:${{ github.sha }} \
              --with-registry-auth \
              ${{ env.SERVICE }}

            echo "✅ Deploy concluído: ${{ github.sha }}"
            docker service ps ${{ env.SERVICE }} --no-trunc | head -5
