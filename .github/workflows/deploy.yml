# Deploy — push em main dispara build + push GHCR + trigger Portainer webhook.
#
# Pré-requisitos (configurar antes do primeiro merge — handoff Lauri):
#  - GH Secret PORTAINER_STACK_WEBHOOK (gerar em Portainer → Stacks → crm-s4s-web → Webhook)
#  - GH Secret GITHUB_TOKEN (auto-disponível; scope write:packages incluso)
#  - Stack `crm-s4s-web` criada no Portainer Hetzner a partir do stack canonico
#    crm-s4s-product/infraestrutura/dev/portainer/stacks/crm-s4s-web.yml (Swarm + Traefik)
#  - DNS A `dev-app.staff4solutions.com.br` apontando pra Hetzner VPS
#  - Rota dev-app → crm-s4s-web:3000 ja vem nas deploy.labels do stack canonico (Traefik)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false # nao cancela deploy em andamento

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lserillojr/crm-s4s-web:latest
            ghcr.io/lserillojr/crm-s4s-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer stack update
        run: |
          if [ -z "${{ secrets.PORTAINER_STACK_WEBHOOK }}" ]; then
            echo "::warning::PORTAINER_STACK_WEBHOOK ainda nao configurado — skip deploy trigger"
            echo "Imagem foi pushada pra GHCR mas Portainer nao foi notificado."
            echo "Configure o secret e re-rode este workflow (workflow_dispatch)."
            exit 0
          fi
          curl -fsS -X POST "${{ secrets.PORTAINER_STACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"image_tag":"${{ github.sha }}"}'
          echo "Portainer webhook acionado pra puxar imagem nova"
